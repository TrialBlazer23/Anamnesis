name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # release upload on main; harmless for PR builds
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'   # JDK 17 matches the AGP 9 requirement
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - run: chmod +x ./gradlew

      - name: Unit tests (JVM)
        run: ./gradlew test

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: anamnesis-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to the rolling release (main only)
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create latest --prerelease \
            --title "Latest builds (content packs + debug APK)" \
            --notes "Rolling release refreshed by CI." \
            || true
          gh release upload latest app/build/outputs/apk/debug/app-debug.apk --clobber

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: '**/build/reports/tests/'
