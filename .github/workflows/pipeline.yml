name: Build content packs

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'pipeline/**'
      - '.github/workflows/pipeline.yml'
  pull_request:
    paths:
      - 'pipeline/**'
      - '.github/workflows/pipeline.yml'

jobs:
  content:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'   # CLTK 1.5.0 supports 3.12
          cache: 'pip'

      - name: Install dependencies (CI path includes CLTK)
        run: pip install -r requirements-ci.txt

      - name: Run pipeline tests
        run: python -m pytest -q

      # The lessons pack is generated from data/lessons/*; the committed copy
      # in feature/learn assets must match, so a PR that edits the authored
      # CSVs without regenerating fails here.
      - name: Build lessons pack
        run: |
          python build_lessons.py --data data/lessons \
            --out out/lessons.json --audio-manifest out/lessons_audio_manifest.json
          cmp out/lessons.json ../feature/learn/src/main/assets/lessons/lessons.json

      - name: Fetch Lyceum morph.db (release asset mirror)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download lyceum-data-v2026.04.09 \
            --repo "$GITHUB_REPOSITORY" --pattern morph.db --dir data/lyceum
          echo "6ce7c237b3fd9d5edd6639cfb3ab066227d0aa734dca25640151aefda27029a5  data/lyceum/morph.db" | sha256sum -c -

      - name: Build Meditations content pack
        run: |
          python build_database.py --work tlg0562.tlg001 --out out/meditations.db \
            --title "Meditations" \
            --vocab-csv data/dcc_greek_core.csv \
            --haines-epub data/haines_1916.epub \
            --middle-liddell \
            --lyceum-morph data/lyceum/morph.db

      - name: Build Iliad content pack (downloadable, not bundled)
        run: |
          python build_database.py --work tlg0012.tlg001 --edition perseus-grc2 \
            --out out/iliad.db --title "Iliad" \
            --vocab-csv data/dcc_greek_core.csv \
            --middle-liddell \
            --lyceum-morph data/lyceum/morph.db

      # Chamberlain recitations (CC BY — see docs/licensing-evidence/).
      # PRs smoke-test 5 lines; main/dispatch builds the full Book 1 (~44 MB).
      - name: Build Iliad Book 1 audio pack (smoke)
        if: github.event_name == 'pull_request'
        run: |
          python build_audio_pack.py \
            --manifest data/audio/iliad_audio_manifest_books1-2.csv \
            --book 1 --limit 5 --out out/iliad_book1_audio.zip

      - name: Build Iliad Book 1 audio pack (full)
        if: github.event_name != 'pull_request'
        run: |
          python build_audio_pack.py \
            --manifest data/audio/iliad_audio_manifest_books1-2.csv \
            --book 1 --out out/iliad_book1_audio.zip

      - uses: actions/upload-artifact@v4
        with:
          name: anamnesis-content-packs
          path: |
            pipeline/out/*.db
            pipeline/out/*.zip
            pipeline/out/*.json

  # On main: refresh the bundled starter pack in the app's assets and publish
  # every pack to the rolling "latest" release, so downloads don't depend on
  # short-lived Actions artifacts. The asset commit is made with GITHUB_TOKEN,
  # which deliberately does NOT retrigger workflows — dispatch "Build APK"
  # afterwards to compile with the fresh asset.
  publish:
    needs: content
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: anamnesis-content-packs
          path: packs

      - name: Refresh bundled starter pack (meditations.db)
        run: |
          if ! cmp -s packs/meditations.db app/src/main/assets/content/meditations.db; then
            cp packs/meditations.db app/src/main/assets/content/meditations.db
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add app/src/main/assets/content/meditations.db
            git commit -m "Refresh bundled meditations.db from pipeline build"
            git push
          else
            echo "Bundled meditations.db already up to date."
          fi

      - name: Refresh bundled lessons pack (lessons.json)
        run: |
          if ! cmp -s packs/lessons.json feature/learn/src/main/assets/lessons/lessons.json; then
            cp packs/lessons.json feature/learn/src/main/assets/lessons/lessons.json
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add feature/learn/src/main/assets/lessons/lessons.json
            git commit -m "Refresh bundled lessons.json from pipeline build"
            git push
          else
            echo "Bundled lessons.json already up to date."
          fi

      - name: Publish packs to the rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create latest --prerelease \
            --title "Latest builds (content packs + debug APK)" \
            --notes "Rolling release refreshed by CI. Content packs are read-only SQLite (+ SHA-256 manifests); the audio pack is CC BY — attribution embedded in its manifest.json." \
            || true
          gh release upload latest packs/* --clobber
