    <p>MARCUS AURELIUS</p>
    <p>BOOK I</p>
    <p>1. From my Grandfather Verus,[1] a kindly disposition and sweetness of temper.</p>
    <p>2. From what I heard of my Father[2] and my memory of him, modesty and manliness.</p>
    <p>9. From Sextus,[20] kindliness, and the example of a household.</p>
    <p>And never to exhibit any symptom of anger.</p>
